name: Cross Compile Dropbear for Rockchip ARMv7 (musl static)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils make gcc bzip2 cpio

    - name: Download musl Toolchain
      run: |
        # Bootlin armv7 硬浮点 + musl 稳定版工具链
        # 目标: Rockchip ARMv7 Cortex-A7 r0p5, uClibc 1.0.31, 内核 5.10.160
        wget https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--musl--stable-2024.05-1.tar.xz
        tar -xf armv7-eabihf--musl--stable-2024.05-1.tar.xz
        echo "$(pwd)/armv7-eabihf--musl--stable-2024.05-1/bin" >> $GITHUB_PATH

    - name: Build Dropbear
      run: |
        TOOLCHAIN_PREFIX="arm-buildroot-linux-musleabihf"

        # 覆盖默认 sftp-server 路径, 指向同目录下的 sftp-server
        cat > localoptions.h << 'HEREDOC'
        /* sftp-server: BusyBox 静态编译, 与 dropbearmulti 同目录部署 */
        #undef SFTPSERVER_PATH
        #define SFTPSERVER_PATH "/oem/tool/sftp-server"
        HEREDOC

        # Cortex-A7 + VFPv4/NEON 硬浮点, 优化体积
        export CFLAGS="-mcpu=cortex-a7 -mfpu=neon-vfpv4 -mfloat-abi=hard -Os"
        export LDFLAGS="-static -Wl,--hash-style=gnu"

        # --enable-static: 正确设置静态构建标志
        # ac_cv_func_fexecve=no: 禁用 re-exec, 避免静态二进制 fexecve 后崩溃
        ./configure --host=${TOOLCHAIN_PREFIX} \
                    CC=${TOOLCHAIN_PREFIX}-gcc \
                    --enable-static \
                    --disable-zlib \
                    --disable-syslog \
                    ac_cv_func_fexecve=no

        make MULTI=1 PROGRAMS="dropbear dropbearkey dbclient scp"
        ${TOOLCHAIN_PREFIX}-strip dropbearmulti

        echo "=== dropbearmulti ==="
        file dropbearmulti
        ${TOOLCHAIN_PREFIX}-readelf -d dropbearmulti 2>/dev/null || echo "(static binary)"

    - name: Build BusyBox sftp-server
      run: |
        TOOLCHAIN_PREFIX="arm-buildroot-linux-musleabihf"

        wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
        tar -xf busybox-1.36.1.tar.bz2
        cd busybox-1.36.1

        # allnoconfig: 关闭所有 applet, 只编译需要的 sftp-server
        # 优势:
        # 1. 二进制极小 (~100KB vs ~1MB)
        # 2. 不会碰到无关 applet 的 musl 头文件兼容问题 (tc/slattach 等)
        # 3. 编译速度极快 (几十秒 vs 几分钟)
        yes "" | make allnoconfig

        # 只启用 sftp 必须的选项
        cat >> .config << 'EOF'
        CONFIG_STATIC=y
        CONFIG_CROSS_COMPILER_PREFIX="arm-buildroot-linux-musleabihf-"
        CONFIG_EXTRA_CFLAGS="-mcpu=cortex-a7 -mfpu=neon-vfpv4 -mfloat-abi=hard -Os"
        CONFIG_EXTRA_LDFLAGS="-static"
        CONFIG_SFTP=y
        CONFIG_FEATURE_SFTP_SERVER=y
        CONFIG_INSTALL_NO_USR=y
        CONFIG_FEATURE_PREFER_APPLETS=y
        EOF

        # oldconfig 只询问 allnoconfig 之后新增的 Kconfig 选项
        yes "" | make oldconfig
        make -j$(nproc)

        cp busybox ../sftp-server
        cd ..

        ${TOOLCHAIN_PREFIX}-strip sftp-server

        echo "=== sftp-server ==="
        file sftp-server

    - name: Package Artifacts
      run: |
        tar -cvf dropbear-bundle-rockchip-armv7.tar \
            dropbearmulti \
            sftp-server
        echo "=== Bundle Contents ==="
        tar -tvf dropbear-bundle-rockchip-armv7.tar

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dropbear-bundle-rockchip-armv7
        path: dropbear-bundle-rockchip-armv7.tar
