name: Cross Compile Dropbear for Rockchip ARMv7 (musl static)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils make gcc bzip2

    - name: Download musl Toolchain
      run: |
        # Bootlin 官方 armv7 硬浮点 + musl 稳定版工具链
        # 目标设备: Rockchip ARMv7 (Cortex-A7 r0p5), uClibc 1.0.31
        # 设备特性: half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae
        #
        # 为什么用 musl 而不是 uClibc-ng:
        # - uClibc-ng 静态链接依赖 vDSO 获取时间, ARM 旧内核上 vDSO 初始化可能失败
        #   导致 gettimeofday() 返回随机值 (体现为 Dropbear 日志时间戳乱跳)
        # - uClibc-ng fexecve re-exec 后静态二进制二次初始化可能崩溃 (kex Connection reset)
        # - musl 静态链接是一等公民, 直接走 syscall 不依赖 vDSO, 行为确定
        # - 静态链接后二进制自包含, 不依赖目标设备的 libc 版本
        wget https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--musl--stable-2024.05-1.tar.xz
        tar -xf armv7-eabihf--musl--stable-2024.05-1.tar.xz

        echo "$(pwd)/armv7-eabihf--musl--stable-2024.05-1/bin" >> $GITHUB_PATH

    - name: Configure and Compile
      run: |
        # 目标设备: Rockchip ARMv7 (Cortex-A7 r0p5), uClibc 1.0.31
        # 内核 5.10.160, CPU part 0xc07
        TOOLCHAIN_PREFIX="arm-buildroot-linux-musleabihf"

        # 针对 Cortex-A7 优化
        # -mcpu=cortex-a7    目标 Cortex-A7, 启用 thumb/edsp/idiv 等扩展
        # -mfpu=neon-vfpv4   匹配设备 VFPv4 + NEON
        # -mfloat-abi=hard   硬浮点 ABI (eabihf)
        # -Os                优化体积 (嵌入式设备)
        export CFLAGS="-mcpu=cortex-a7 -mfpu=neon-vfpv4 -mfloat-abi=hard -Os"

        # -static: musl 静态链接, 自包含无运行时依赖
        # musl 的 syscall 直通机制不依赖 vDSO, 避免 uClibc-ng 的时间戳异常
        export LDFLAGS="-static -Wl,--hash-style=gnu"

        # ac_cv_func_fexecve=no: 禁用 re-exec 特性
        # fexecve 在静态二进制中会导致子进程 re-exec 后 C 库二次初始化异常
        # 回退到传统 fork 模型, 更稳定
        ./configure --host=${TOOLCHAIN_PREFIX} \
                    CC=${TOOLCHAIN_PREFIX}-gcc \
                    --enable-static \
                    --disable-zlib \
                    --disable-syslog \
                    ac_cv_func_fexecve=no

        # 编译多合一二进制文件 (Multi-binary)
        make MULTI=1 PROGRAMS="dropbear dropbearkey dbclient scp"

        # 裁剪符号表, 减小嵌入式设备上的二进制体积
        ${TOOLCHAIN_PREFIX}-strip dropbearmulti

        # 验证: 打印架构和链接信息
        echo "=== Binary Architecture Info ==="
        file dropbearmulti
        echo "=== Dynamic Section (should be empty for static binary) ==="
        ${TOOLCHAIN_PREFIX}-readelf -d dropbearmulti 2>/dev/null || echo "(static binary, no dynamic section)"

    - name: Package Binary (tar preserves exec permissions)
      run: |
        # GitHub artifact zip 包会丢失 +x 权限
        # tar 打包保留权限位, 设备端 tar -xf 即可直接运行
        tar -cvf dropbearmulti-rockchip-armv7-musl.tar dropbearmulti

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dropbearmulti-rockchip-armv7-musl
        path: dropbearmulti-rockchip-armv7-musl.tar
