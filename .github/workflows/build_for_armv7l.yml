name: Cross Compile Dropbear for Rockchip uClibc

on:
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils make gcc bzip2

    - name: Download uClibc Toolchain
      run: |
        # 修正后的 Bootlin 官方 armv7 硬浮点 + uClibc 稳定版工具链链接
        wget https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--uclibc--stable-2024.05-1.tar.xz
        tar -xf armv7-eabihf--uclibc--stable-2024.05-1.tar.xz
        
        # 将解压后的工具链 bin 目录加入到系统的 PATH 环境中
        echo "$(pwd)/armv7-eabihf--uclibc--stable-2024.05-1/bin" >> $GITHUB_PATH

    - name: Download Dropbear Source
      run: |
        # 获取稳定版 Dropbear 源码
        wget https://matt.ucc.asn.au/dropbear/releases/dropbear-2024.85.tar.bz2
        tar -xf dropbear-2024.85.tar.bz2
        
    - name: Configure and Compile
      run: |
        cd dropbear-2024.85
        
        # 使用工具链中的交叉编译器进行配置
        ./configure --host=arm-buildroot-linux-uclibcgnueabihf \
                    CC=arm-buildroot-linux-uclibcgnueabihf-gcc \
                    --disable-zlib \
                    --disable-syslog
        
        # 编译多合一二进制文件 (Multi-binary)
        make MULTI=1 PROGRAMS="dropbear dropbearkey dbclient scp"
        
        # 在 log 里打印架构属性，方便直接确认
        file dropbearmulti

    - name: Upload Artifact
      uses: artifacts/upload-artifact@v4
      with:
        name: dropbearmulti-rockchip-uclibc
        path: dropbear-2024.85/dropbearmulti