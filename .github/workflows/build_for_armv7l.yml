name: Cross Compile Dropbear for Rockchip ARMv7 (musl static)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils make gcc bzip2 cpio

    - name: Download musl Toolchain
      run: |
        # Bootlin armv7 硬浮点 + musl 稳定版工具链
        # 目标: Rockchip ARMv7 Cortex-A7 r0p5, uClibc 1.0.31, 内核 5.10.160
        wget https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--musl--stable-2024.05-1.tar.xz
        tar -xf armv7-eabihf--musl--stable-2024.05-1.tar.xz
        echo "$(pwd)/armv7-eabihf--musl--stable-2024.05-1/bin" >> $GITHUB_PATH

    - name: Build Dropbear
      run: |
        TOOLCHAIN_PREFIX="arm-buildroot-linux-musleabihf"

        # 覆盖默认 sftp-server 路径, 指向同目录下的 sftp-server
        cat > localoptions.h << 'HEREDOC'
        /* sftp-server: BusyBox 静态编译, 与 dropbearmulti 同目录部署 */
        #undef SFTPSERVER_PATH
        #define SFTPSERVER_PATH "/oem/tool/sftp-server"
        HEREDOC

        # Cortex-A7 + VFPv4/NEON 硬浮点, 优化体积
        export CFLAGS="-mcpu=cortex-a7 -mfpu=neon-vfpv4 -mfloat-abi=hard -Os"
        export LDFLAGS="-static -Wl,--hash-style=gnu"

        # --enable-static: 正确设置静态构建标志
        # ac_cv_func_fexecve=no: 禁用 re-exec, 避免静态二进制 fexecve 后崩溃
        ./configure --host=${TOOLCHAIN_PREFIX} \
                    CC=${TOOLCHAIN_PREFIX}-gcc \
                    --enable-static \
                    --disable-zlib \
                    --disable-syslog \
                    ac_cv_func_fexecve=no

        make MULTI=1 PROGRAMS="dropbear dropbearkey dbclient scp"
        ${TOOLCHAIN_PREFIX}-strip dropbearmulti

        echo "=== dropbearmulti ==="
        file dropbearmulti
        ${TOOLCHAIN_PREFIX}-readelf -d dropbearmulti 2>/dev/null || echo "(static binary)"

    - name: Build BusyBox sftp-server
      run: |
        TOOLCHAIN_PREFIX="arm-buildroot-linux-musleabihf"
        TOOLCHAIN_DIR="${{ github.workspace }}/armv7-eabihf--musl--stable-2024.05-1"

        wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
        tar -xf busybox-1.36.1.tar.bz2
        cd busybox-1.36.1

        # defconfig: 可靠基线, 保证所有 Kconfig 基础设施可用
        make defconfig

        # 编译 host 端 scripts/config 工具 (必须先编译才能用)
        make scripts/config

        # 启用静态链接
        ./scripts/config --enable  CONFIG_STATIC
        ./scripts/config --disable CONFIG_PIE

        # 精简无关 applet (减小体积, 同时也避免依赖问题)
        ./scripts/config --disable CONFIG_ASH
        ./scripts/config --disable CONFIG_HUSH
        ./scripts/config --disable CONFIG_SH_IS_ASH
        ./scripts/config --disable CONFIG_SH_IS_HUSH
        ./scripts/config --enable  CONFIG_SH_IS_NONE
        ./scripts/config --disable CONFIG_VI
        ./scripts/config --disable CONFIG_UDHCPC
        ./scripts/config --disable CONFIG_UDHCPD
        ./scripts/config --disable CONFIG_WGET
        ./scripts/config --disable CONFIG_TELNET
        ./scripts/config --disable CONFIG_TELNETD
        ./scripts/config --disable CONFIG_HTTPD
        ./scripts/config --disable CONFIG_NTPD
        ./scripts/config --disable CONFIG_TFTP
        ./scripts/config --disable CONFIG_FTPGET
        ./scripts/config --disable CONFIG_FTPPUT

        # 确保 sftp (客户端 + 服务端) 启用
        ./scripts/config --enable  CONFIG_SFTP
        ./scripts/config --enable  CONFIG_FEATURE_SFTP_SERVER

        # 保证独立运行所需的基础设施
        ./scripts/config --enable  CONFIG_INSTALL_NO_USR
        ./scripts/config --enable  CONFIG_FEATURE_PREFER_APPLETS
        ./scripts/config --enable  CONFIG_FEATURE_SH_STANDALONE

        # 交叉编译器 + 优化标志
        ./scripts/config --set-str CONFIG_CROSS_COMPILER_PREFIX "${TOOLCHAIN_PREFIX}-"
        ./scripts/config --set-str CONFIG_SYSROOT "${TOOLCHAIN_DIR}/${TOOLCHAIN_PREFIX}/sysroot"
        ./scripts/config --set-str CONFIG_EXTRA_CFLAGS "-mcpu=cortex-a7 -mfpu=neon-vfpv4 -mfloat-abi=hard -Os"
        ./scripts/config --set-str CONFIG_EXTRA_LDFLAGS "-static"

        # 自动解决 Kconfig 依赖 (不会交互式提问)
        yes "" | make oldconfig
        make -j$(nproc)

        # BusyBox 通过 argv[0] 识别 applet
        # 命名为 sftp-server → 自动进入 SFTP 服务端模式
        cp busybox ../sftp-server
        cd ..

        ${TOOLCHAIN_PREFIX}-strip sftp-server

        echo "=== sftp-server ==="
        file sftp-server

    - name: Package Artifacts
      run: |
        tar -cvf dropbear-bundle-rockchip-armv7.tar \
            dropbearmulti \
            sftp-server
        echo "=== Bundle Contents ==="
        tar -tvf dropbear-bundle-rockchip-armv7.tar

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dropbear-bundle-rockchip-armv7
        path: dropbear-bundle-rockchip-armv7.tar
